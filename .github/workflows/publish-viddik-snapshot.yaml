name: Publish viddik wip snapshots

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  publish-viddik:
    runs-on: [ ubuntu-latest ]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Determine version
        id: ver
        run: |
          VERSION=$(grep viddik.version gradle.properties | cut -d'=' -f2).${{ github.run_number }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        run: ./gradlew build publishAllPublicationsToWipRepository dokkaGenerate --no-daemon
        env:
          ORG_GRADLE_PROJECT_REPOSILITE_USER: ${{ secrets.REPOSILITE_USER }}
          ORG_GRADLE_PROJECT_REPOSILITE_SECRET: ${{ secrets.REPOSILITE_SECRET }}
          ORG_GRADLE_PROJECT_VERSION: ${{ steps.ver.outputs.version }}

      - name: Deploy dokka to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/dokka/html
          full_commit_message: "📚 Deploy Dokka documentation"
